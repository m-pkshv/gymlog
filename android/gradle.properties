org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Windows-only workaround: the project (E:\...) and the pub cache
# (C:\Users\...\Pub\Cache\...) live on different drives; Kotlin's relocatable
# incremental-compilation cache cannot build a relative path across drive
# roots and crashes ("this and base files have different roots"). Disabling
# Kotlin incremental compilation avoids that path entirely.
kotlin.incremental=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
